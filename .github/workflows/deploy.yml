# .github/workflows/deploy.yml
name: Test + Deploy Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: ./buffet_indicator

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: buffet_indicator/requirements.lock

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock --require-hashes || pip install -r requirements.lock

      - name: Lint (ruff)
        run: ruff check src/ tests/
        continue-on-error: false

      - name: Type check (mypy strict)
        run: mypy --strict src/
        continue-on-error: true  # allow until full strict pass

      - name: Security scan (bandit)
        run: bandit -r src/ -ll
        continue-on-error: false

      - name: Run pytest
        run: pytest tests/ -q --tb=short --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true

  build-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: ./buffet_indicator
          push: true
          tags: |
            ghcr.io/mvfoundation01/macro:${{ github.sha }}
            ghcr.io/mvfoundation01/macro:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-hf-spaces:
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add HF Space as remote
          # Space URL pattern: https://huggingface.co/spaces/mvfoundation01/macro-dashboard
          git remote add space https://user:$HF_TOKEN@huggingface.co/spaces/mvfoundation01/macro-dashboard 2>/dev/null || true

          # Push (force because Spaces may have its own README commit)
          git push --force space main:main

      - name: Notify (optional Discord webhook)
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\":\"Dashboard deployed: https://huggingface.co/spaces/mvfoundation01/macro-dashboard - commit ${{ github.sha }}\"}" \
            "$DISCORD_WEBHOOK_URL" || true
