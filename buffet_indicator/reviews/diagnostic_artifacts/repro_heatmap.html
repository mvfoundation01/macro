<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Heatmap repro</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
<button id="show">Show heatmap</button>
<div id="container" style="display:none">
  <div id="heatmap" style="width: 100%; height: 480px;"></div>
</div>
<script>
const spec = {
  data: [{
    type: "heatmap",
    x: ["a","b","c","d","e","f","g","h","i"],
    y: ["a","b","c","d","e","f","g","h","i"],
    z: [[1,0.95,0.68,0.91,0.92,0.65,0.88,0.95,0.92],
        [0.95,1,0.78,0.95,0.95,0.58,0.97,0.99,0.96],
        [0.68,0.78,1,0.81,0.72,0.57,0.75,0.82,0.69],
        [0.91,0.95,0.81,1,0.98,0.63,0.93,0.98,0.93],
        [0.92,0.95,0.72,0.98,1,0.56,0.95,0.97,0.95],
        [0.65,0.58,0.57,0.63,0.56,1,0.43,0.64,0.49],
        [0.88,0.97,0.75,0.93,0.95,0.43,1,0.95,0.94],
        [0.95,0.99,0.82,0.98,0.97,0.64,0.95,1,0.95],
        [0.92,0.96,0.69,0.93,0.95,0.49,0.94,0.95,1]],
    text: [["+1.00","+0.95","+0.68","+0.91","+0.92","+0.65","+0.88","+0.95","+0.92"],
           ["+0.95","+1.00","+0.78","+0.95","+0.95","+0.58","+0.97","+0.99","+0.96"],
           ["+0.68","+0.78","+1.00","+0.81","+0.72","+0.57","+0.75","+0.82","+0.69"],
           ["+0.91","+0.95","+0.81","+1.00","+0.98","+0.63","+0.93","+0.98","+0.93"],
           ["+0.92","+0.95","+0.72","+0.98","+1.00","+0.56","+0.95","+0.97","+0.95"],
           ["+0.65","+0.58","+0.57","+0.63","+0.56","+1.00","+0.43","+0.64","+0.49"],
           ["+0.88","+0.97","+0.75","+0.93","+0.95","+0.43","+1.00","+0.95","+0.94"],
           ["+0.95","+0.99","+0.82","+0.98","+0.97","+0.64","+0.95","+1.00","+0.95"],
           ["+0.92","+0.96","+0.69","+0.93","+0.95","+0.49","+0.94","+0.95","+1.00"]],
    texttemplate: "%{text}",
    textfont: {size: 12},
    colorscale: "RdBu",
    reversescale: true,
    zmin: -1, zmax: 1,
    colorbar: {title: {text: "rho"}}
  }],
  layout: {
    height: 480,
    width: 900,
    autosize: false,
    margin: {t: 50, b: 100, l: 130, r: 60}
  }
};

document.getElementById("show").addEventListener("click", function() {
  document.getElementById("container").style.display = "block";
  Plotly.newPlot("heatmap", spec.data, spec.layout, {responsive: true});
});

// Auto-click after 100ms for the test harness
setTimeout(() => document.getElementById("show").click(), 200);
</script>
</body>
</html>
